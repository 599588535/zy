<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>进销存 · 轻简版</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root {
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-secondary: #64748b;
      --primary: #3b82f6;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --border: #e2e8f0;
      --shadow: 0 2px 8px rgba(0,0,0,0.04);
      --radius: 14px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }
    .header {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6, #2dd4bf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sync-btns { display: flex; gap: 8px; }
    .sync-btns button {
      background: white;
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--primary);
      cursor: pointer;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 12px 12px; }

    .tabs {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding: 8px 0 12px;
      -webkit-overflow-scrolling: touch;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 0 0 auto;
      padding: 8px 18px;
      background: white;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      box-shadow: var(--shadow);
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .tab.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      font-weight: 600;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: white;
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }

    .row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; align-items: center; }
    .col { flex: 1 1 100%; min-width: 0; }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 3px;
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
    }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.85rem;
      background: #f8fafc;
      color: var(--text);
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
    }

    button {
      padding: 10px 18px;
      background: var(--primary);
      color: white;
      border: none;
      font-weight: 600;
      border-radius: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
    }
    button.danger { background: var(--danger); }
    button.secondary { background: #f1f5f9; color: var(--text); }
    button.success { background: var(--success); }
    button.warning { background: var(--warning); color: white; }

    .empty { color: #94a3b8; text-align: center; padding: 24px; }

    .list-card {
      background: white;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .list-card .line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
    }
    .list-card .line .label { color: var(--text-secondary); }
    .list-card .actions {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      justify-content: flex-end;
    }
    .list-card .actions button {
      padding: 6px 12px;
      font-size: 0.75rem;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.65rem;
      font-weight: 600;
    }
    .badge-warning { background: #fef3c7; color: #92400e; }
    .badge-success { background: #d1fae5; color: #065f46; }

    hr { margin: 14px 0; border: 0.5px solid var(--border); }

    .stat-box {
      background: white;
      border-radius: 12px;
      padding: 12px;
      display: inline-block;
      margin: 4px;
      min-width: 70px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .stat-num { font-size: 1.1rem; font-weight: 700; margin-top: 2px; }

    .item-list { background: #f8fafc; border-radius: 10px; padding: 10px; margin-bottom: 10px; }
    .ocr-section { background: white; border-radius: var(--radius); padding: 14px; margin-bottom: 14px; box-shadow: var(--shadow); }
    .ocr-preview-img { max-width: 100%; border-radius: 10px; margin-top: 10px; }
    .quick-form { background: #f8fafc; border-radius: var(--radius); padding: 14px; margin-bottom: 14px; border: 1px dashed var(--border); }
    .stock-info { font-size: 0.75rem; color: var(--primary); font-weight: 500; }
    .edit-panel { background: #fffbeb; padding: 12px; border-radius: 10px; margin: 10px 0; }
  </style>
</head>
<body>
<div class="header">
  <h1>📦 进销存</h1>
  <div class="sync-btns">
    <button onclick="exportData()">📤</button>
    <button onclick="document.getElementById('importFile').click()">📥</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
  </div>
</div>

<div class="container">
  <div class="tabs">
    <div class="tab active" data-tab="tab-accounts">👤 账号</div>
    <div class="tab" data-tab="tab-purchase">📋 采购</div>
    <div class="tab" data-tab="tab-receive">✅ 签收</div>
    <div class="tab" data-tab="tab-sale">📤 销售</div>
    <div class="tab" data-tab="tab-shipping">🚚 运费</div>
    <div class="tab" data-tab="tab-stock">📊 库存</div>
    <div class="tab" data-tab="tab-profit">💰 利润</div>
  </div>

  <!-- 账号管理 -->
  <div id="tab-accounts" class="panel active">
    <div class="card">
      <div class="row">
        <div class="col"><input type="text" id="newAccountName" placeholder="账号名称"></div>
        <div><button onclick="addAccount()">➕ 添加</button></div>
      </div>
    </div>
    <div id="accountList"></div>
  </div>

  <!-- 采购录入 -->
  <div id="tab-purchase" class="panel">
    <div class="ocr-section">
      <input type="file" id="ocrImageInput" accept="image/*" style="display:none;">
      <button class="success" onclick="document.getElementById('ocrImageInput').click()">📸 识别截图</button>
      <span style="font-size:0.85rem;color:#64748b;margin-left:8px;">自动填单号、数量、价格</span>
      <div id="ocrStatus" style="font-size:0.8rem;color:#64748b;margin-top:6px;"></div>
      <img id="ocrPreview" class="ocr-preview-img" style="display:none;">
    </div>
    <div class="card">
      <div class="row">
        <div class="col"><label>账号</label><select id="orderAccount"></select></div>
        <div class="col"><label>订单号</label><input type="text" id="orderNo"></div>
        <div class="col"><label>日期</label><input type="date" id="orderDate"></div>
      </div>
      <div class="row"><div class="col"><label>备注</label><input type="text" id="orderRemark"></div></div>
      <hr>
      <h4 style="margin-bottom:10px;font-size:0.9rem;">添加商品</h4>
      <div class="row">
        <div class="col"><input type="text" id="itemProduct" list="productList" autocomplete="off" placeholder="商品名称"></div>
        <datalist id="productList"></datalist>
        <div class="col"><input type="number" id="itemQty" value="1" min="1" placeholder="数量"></div>
        <div class="col"><input type="number" id="itemPrice" step="0.01" placeholder="进价"></div>
        <div><button class="secondary" onclick="addItemToCart()">➕ 添加</button></div>
      </div>
      <div class="item-list" id="cartItems"><p style="color:#94a3b8;">暂无商品</p></div>
      <button onclick="saveOrderItems()">📝 保存采购单</button>
    </div>
    <div class="card">
      <div class="row"><div class="col"><input type="text" id="orderSearch" placeholder="🔍 搜索订单"></div></div>
      <div id="orderList"></div>
    </div>
    <div id="editOrderPanel" style="display:none;" class="edit-panel"></div>
  </div>

  <!-- 签收登记 -->
  <div id="tab-receive" class="panel">
    <div class="card">
      <div class="row"><div class="col"><input type="text" id="receiveSearch" placeholder="🔍 搜索待签收"></div></div>
      <div id="pendingList"></div>
    </div>
  </div>

  <!-- 销售出库 -->
  <div id="tab-sale" class="panel">
    <div class="card">
      <div class="row">
        <div class="col"><label>商品</label><input type="text" id="saleProduct" list="saleProductList" autocomplete="off" placeholder="选择或输入"><span id="saleStockInfo" class="stock-info"></span></div>
        <datalist id="saleProductList"></datalist>
        <div class="col"><label>数量</label><input type="number" id="saleQty" value="1" min="1"></div>
        <div class="col"><label>售价</label><input type="number" id="salePrice" step="0.01" placeholder="卖价"></div>
      </div>
      <div class="row"><div class="col"><label>日期</label><input type="date" id="saleDate"></div></div>
      <div class="row" style="font-size:0.85rem;color:#64748b;">
        <span>成本：<span id="costPreview">--</span></span>
        <span>总成本：<span id="totalCostPreview">--</span></span>
        <span>利润：<span id="estProfit">--</span></span>
      </div>
      <button onclick="addSale()">📌 记录销售</button>
    </div>
    <div id="saleList"></div>
  </div>

  <!-- 快递费 -->
  <div id="tab-shipping" class="panel">
    <div class="card">
      <div class="row">
        <div class="col"><input type="date" id="shippingDate"></div>
        <div class="col"><input type="number" id="shippingAmount" step="0.01" placeholder="运费金额"></div>
        <div class="col"><input type="text" id="shippingNote" placeholder="备注"></div>
        <div><button onclick="addShippingFee()">🚚 记录</button></div>
      </div>
    </div>
    <div id="shippingList"></div>
  </div>

  <!-- 库存 -->
  <div id="tab-stock" class="panel">
    <div class="card">
      <div class="row">
        <div class="col"><input type="text" id="stockSearch" placeholder="🔍 搜索库存"></div>
        <button class="success" onclick="toggleQuickForm()">➕ 入库</button>
        <button class="secondary" onclick="toggleStockGroup()">📊 汇总</button>
      </div>
      <div id="quickStockForm" class="quick-form" style="display:none;">
        <h4 style="font-size:0.9rem;margin-bottom:8px;">📥 新增库存</h4>
        <div class="row">
          <div class="col"><select id="quickAccount"></select></div>
          <div class="col"><input type="text" id="quickProduct" list="productList" autocomplete="off" placeholder="商品"></div>
          <div class="col"><input type="number" id="quickQty" value="1" min="1" placeholder="数量"></div>
          <div class="col"><input type="number" id="quickPrice" step="0.01" placeholder="进价"></div>
          <div class="col"><input type="date" id="quickDate"></div>
        </div>
        <div class="row">
          <div class="col"><input type="text" id="quickRemark" placeholder="备注"></div>
          <div><button onclick="quickAddStock()">✅ 入库</button></div>
        </div>
      </div>
    </div>
    <div id="stockGroupView" style="display:none;" class="card"></div>
    <div id="stockList"></div>
    <div id="stockEditPanel" style="display:none;" class="edit-panel"></div>
  </div>

  <!-- 利润报表 -->
  <div id="tab-profit" class="panel">
    <div class="card">
      <div class="row">
        <div class="col"><select id="profitAccount"><option value="all">全部账号</option></select></div>
        <div class="col"><input type="date" id="profitStart"></div>
        <div class="col"><input type="date" id="profitEnd"></div>
        <div><button onclick="renderProfit()">查询</button></div>
      </div>
    </div>
    <div id="profitSummary" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
    <div id="profitList"></div>
    <div id="profitGroupSummary"></div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'JD_INVENTORY_V6';
  let data = {
    accounts: ['京东账号A', '京东账号B', '京东账号C', '京东账号D', '京东账号E', '京东账号F', '京东账号G'],
    orders: [],
    sales: [],
    shippingFees: []
  };
  let currentCart = [];

  function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  function loadData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) try {
      const p = JSON.parse(stored);
      data.accounts = p.accounts || data.accounts;
      data.orders = p.orders || [];
      data.sales = p.sales || [];
      data.shippingFees = p.shippingFees || [];
    } catch(e) {}
    document.getElementById('orderDate').valueAsDate = new Date();
    document.getElementById('saleDate').valueAsDate = new Date();
    document.getElementById('shippingDate').valueAsDate = new Date();
    document.getElementById('quickDate').valueAsDate = new Date();
    updateAllDatalists();
    clearCart();
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `进销存_备份_${new Date().toISOString().slice(0,10)}.json`; a.click();
    URL.revokeObjectURL(url);
  }
  function importData(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const imported = JSON.parse(e.target.result);
        if (imported.accounts && imported.orders && imported.sales && imported.shippingFees) {
          if (confirm('即将覆盖当前所有数据，确定导入吗？')) { data = imported; saveData(); refreshAllUI(); alert('导入成功！'); }
        } else alert('文件格式不正确');
      } catch(err) { alert('解析失败'); }
    };
    reader.readAsText(file); input.value = '';
  }

  function refreshAllUI() {
    refreshSelects(); renderAccounts(); renderOrderList(); renderPendingItems();
    renderSaleList(); renderShippingList(); renderStock(); updateAllDatalists(); updateSalePreview();
  }

  function refreshSelects() {
    const oa = document.getElementById('orderAccount'); if(oa) oa.innerHTML = data.accounts.map(a => `<option value="${a}">${a}</option>`).join('');
    const qa = document.getElementById('quickAccount'); if(qa) qa.innerHTML = data.accounts.map(a => `<option value="${a}">${a}</option>`).join('');
    const pa = document.getElementById('profitAccount'); if(pa) pa.innerHTML = '<option value="all">全部</option>'+data.accounts.map(a => `<option value="${a}">${a}</option>`).join('');
  }

  function genId() { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); }
  function updateAllDatalists() {
    const products = [...new Set(data.orders.map(o => o.product))];
    const html = products.map(p => `<option value="${p}">`).join('');
    document.getElementById('productList').innerHTML = html;
    document.getElementById('saleProductList').innerHTML = html;
  }

  function addAccount() {
    const name = document.getElementById('newAccountName').value.trim();
    if(!name) return alert('请输入名称');
    if(data.accounts.includes(name)) return alert('已存在');
    data.accounts.push(name); saveData();
    document.getElementById('newAccountName').value = '';
    refreshSelects(); renderAccounts();
  }
  function deleteAccount(name) {
    if(!confirm(`确定删除"${name}"吗？`)) return;
    data.accounts = data.accounts.filter(a => a !== name); saveData();
    refreshSelects(); renderAccounts();
  }
  function renderAccounts() {
    const container = document.getElementById('accountList');
    container.innerHTML = data.accounts.map(a => `
      <div class="list-card">
        <div class="line"><span>${a}</span></div>
        <div class="actions"><button class="danger" onclick="deleteAccount('${a}')">删除</button></div>
      </div>
    `).join('');
  }

  function clearCart() { currentCart = []; renderCart(); }
  function addItemToCart() {
    const product = document.getElementById('itemProduct').value.trim();
    const qty = parseInt(document.getElementById('itemQty').value);
    const price = parseFloat(document.getElementById('itemPrice').value);
    if(!product || !qty || isNaN(price)) return alert('请完整填写商品、数量和进价');
    currentCart.push({ product, qty, unitPrice: price });
    document.getElementById('itemProduct').value = '';
    document.getElementById('itemQty').value = 1;
    document.getElementById('itemPrice').value = '';
    renderCart();
  }
  function removeFromCart(index) { currentCart.splice(index, 1); renderCart(); }
  function renderCart() {
    const container = document.getElementById('cartItems');
    if (currentCart.length === 0) { container.innerHTML = '<p style="color:#94a3b8;">暂无商品</p>'; return; }
    container.innerHTML = currentCart.map((item, idx) => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;">
        <span>${item.product} ×${item.qty} ¥${item.unitPrice.toFixed(2)}</span>
        <button class="danger" style="padding:4px 10px;" onclick="removeFromCart(${idx})">删除</button>
      </div>
    `).join('');
  }
  function saveOrderItems() {
    const account = document.getElementById('orderAccount').value;
    const orderNo = document.getElementById('orderNo').value.trim();
    const date = document.getElementById('orderDate').value;
    const remark = document.getElementById('orderRemark').value.trim();
    if(!account || !orderNo || !date) return alert('请填写账号、订单号和日期');
    if(currentCart.length === 0) return alert('请至少添加一个商品');
    const newOrders = currentCart.map(item => ({
      id: genId(), account, orderNo, product: item.product, qty: item.qty, unitPrice: item.unitPrice,
      date, remark, receivedQty: 0, soldQty: 0, status: 'pending'
    }));
    data.orders.push(...newOrders);
    saveData(); clearCart();
    document.getElementById('orderNo').value = ''; document.getElementById('orderRemark').value = '';
    updateAllDatalists(); renderOrderList();
    alert('采购单已保存！');
  }
  function deleteOrder(id) {
    if(!confirm('删除此记录？')) return;
    data.orders = data.orders.filter(o => o.id !== id);
    saveData();
    updateAllDatalists();
    renderOrderList();
    renderPendingItems();
    renderStock();
  }
  function renderOrderList() {
    const search = (document.getElementById('orderSearch')?.value || '').toLowerCase();
    let list = data.orders;
    if(search) list = list.filter(o => o.orderNo.toLowerCase().includes(search) || o.product.toLowerCase().includes(search));
    const container = document.getElementById('orderList');
    if(list.length===0) { container.innerHTML = '<p class="empty">暂无采购单</p>'; return; }
    container.innerHTML = list.map(o => {
      const badge = o.status==='received' ? '<span class="badge badge-success">已签</span>' : '<span class="badge badge-warning">待签</span>';
      return `<div class="list-card">
        <div class="line"><span class="label">账号</span><span>${o.account}</span></div>
        <div class="line"><span class="label">商品</span><span>${o.product}</span></div>
        <div class="line"><span class="label">订购/已收</span><span>${o.qty} / ${o.receivedQty}</span></div>
        <div class="line"><span class="label">状态</span><span>${badge}</span></div>
        <div class="line"><span class="label">日期</span><span>${o.date}</span></div>
        <div class="actions">
          <button class="warning" onclick="editOrder('${o.id}')">编辑</button>
          <button class="danger" onclick="deleteOrder('${o.id}')">删除</button>
        </div>
      </div>`;
    }).join('');
  }

  function quickReceiveById(orderId) {
    const order = data.orders.find(o => o.id === orderId);
    if(!order || order.receivedQty >= order.qty) return;
    order.receivedQty = order.qty;
    order.status = 'received';
    order.receiveDate = new Date().toISOString().split('T')[0];
    if(order.soldQty === undefined) order.soldQty = 0;
    saveData(); renderPendingItems(); renderOrderList(); renderStock();
  }
  function renderPendingItems() {
    const search = (document.getElementById('receiveSearch')?.value || '').toLowerCase();
    let pending = data.orders.filter(o => o.receivedQty < o.qty);
    if(search) pending = pending.filter(o => o.orderNo.toLowerCase().includes(search) || o.product.toLowerCase().includes(search));
    const container = document.getElementById('pendingList');
    if(pending.length === 0) { container.innerHTML = '<p class="empty">🎉 全部签收完毕</p>'; return; }
    container.innerHTML = pending.map(o => {
      const left = o.qty - o.receivedQty;
      return `<div class="list-card">
        <div class="line"><span class="label">账号</span><span>${o.account}</span></div>
        <div class="line"><span class="label">商品</span><span>${o.product}</span></div>
        <div class="line"><span class="label">订购/已收/未收</span><span>${o.qty} / ${o.receivedQty} / <strong>${left}</strong></span></div>
        <div class="actions"><button class="success" onclick="quickReceiveById('${o.id}')">📦 签收</button></div>
      </div>`;
    }).join('');
  }

  function getTotalStock(productName) {
    return data.orders.filter(o => o.product === productName && o.receivedQty > (o.soldQty||0))
      .reduce((sum, o) => sum + (o.receivedQty - (o.soldQty||0)), 0);
  }
  function getAvailableStock(productName) {
    return data.orders.filter(o => o.product === productName && o.receivedQty > (o.soldQty||0))
      .sort((a,b) => (a.receiveDate||a.date).localeCompare(b.receiveDate||b.date));
  }
  function updateSalePreview() {
    const product = document.getElementById('saleProduct').value.trim();
    const qty = parseInt(document.getElementById('saleQty').value) || 0;
    const price = parseFloat(document.getElementById('salePrice').value) || 0;
    document.getElementById('saleStockInfo').innerHTML = product ? `库存：${getTotalStock(product)} 件` : '';
    if (!product || qty <= 0) { document.getElementById('costPreview').innerText = '--'; document.getElementById('totalCostPreview').innerText = '--'; document.getElementById('estProfit').innerText = '--'; return; }
    const stock = getAvailableStock(product);
    let remaining = qty, totalCost = 0;
    for (let order of stock) {
      const avail = order.receivedQty - (order.soldQty||0);
      const take = Math.min(remaining, avail);
      totalCost += take * order.unitPrice;
      remaining -= take;
      if (remaining === 0) break;
    }
    if (remaining > 0) { document.getElementById('costPreview').innerText = '不足'; document.getElementById('estProfit').innerText = '--'; return; }
    document.getElementById('costPreview').innerText = (totalCost/qty).toFixed(2);
    document.getElementById('totalCostPreview').innerText = totalCost.toFixed(2);
    document.getElementById('estProfit').innerText = (price*qty - totalCost).toFixed(2);
  }
  function addSale() {
    const product = document.getElementById('saleProduct').value.trim();
    const qty = parseInt(document.getElementById('saleQty').value);
    const price = parseFloat(document.getElementById('salePrice').value);
    const saleDate = document.getElementById('saleDate').value;
    if(!product || !qty || isNaN(price) || !saleDate) return alert('请完整填写');
    const stock = getAvailableStock(product);
    let remaining = qty, totalCost = 0;
    const batches = [];
    for (let order of stock) {
      const avail = order.receivedQty - (order.soldQty||0);
      const take = Math.min(remaining, avail);
      totalCost += take * order.unitPrice;
      batches.push({ orderId: order.id, qty: take, unitCost: order.unitPrice });
      remaining -= take;
      if (remaining === 0) break;
    }
    if (remaining > 0) return alert(`库存不足，剩余 ${getTotalStock(product)} 件`);
    const profit = price * qty - totalCost;
    const sale = { id: genId(), product, qty, salePrice: price, totalCost, profit, saleDate, batches };
    for (let b of batches) {
      const order = data.orders.find(o => o.id === b.orderId);
      if (order) order.soldQty = (order.soldQty||0) + b.qty;
    }
    data.sales.push(sale); saveData();
    document.getElementById('saleQty').value = 1;
    document.getElementById('salePrice').value = '';
    alert(`销售已保存！\n剩余库存：${getTotalStock(product)} 件`);
    renderSaleList(); updateAllDatalists(); updateSalePreview(); renderStock();
  }
  function deleteSale(id) {
    if(!confirm('删除此销售记录？')) return;
    const sale = data.sales.find(s => s.id === id);
    if(sale && sale.batches) {
      for (let b of sale.batches) {
        const order = data.orders.find(o => o.id === b.orderId);
        if(order) order.soldQty = Math.max(0, (order.soldQty||0) - b.qty);
      }
    }
    data.sales = data.sales.filter(s => s.id !== id); saveData();
    renderSaleList(); renderStock();
  }
  function renderSaleList() {
    const container = document.getElementById('saleList');
    if(data.sales.length === 0) { container.innerHTML = '<p class="empty">暂无销售记录</p>'; return; }
    container.innerHTML = data.sales.map(s => `
      <div class="list-card">
        <div class="line"><span class="label">商品</span><span>${s.product}</span></div>
        <div class="line"><span class="label">数量</span><span>${s.qty}</span></div>
        <div class="line"><span class="label">售价</span><span>¥${s.salePrice.toFixed(2)}</span></div>
        <div class="line"><span class="label">利润</span><span style="color:${s.profit>=0?'#10b981':'#ef4444'}">¥${s.profit.toFixed(2)}</span></div>
        <div class="line"><span class="label">日期</span><span>${s.saleDate}</span></div>
        <div class="actions"><button class="danger" onclick="deleteSale('${s.id}')">删除</button></div>
      </div>
    `).join('');
  }

  function addShippingFee() {
    const date = document.getElementById('shippingDate').value;
    const amount = parseFloat(document.getElementById('shippingAmount').value);
    const note = document.getElementById('shippingNote').value.trim();
    if(!date || isNaN(amount) || amount <= 0) return alert('请填写日期和有效金额');
    data.shippingFees.push({ id: genId(), date, amount, note }); saveData();
    document.getElementById('shippingAmount').value = '';
    document.getElementById('shippingNote').value = '';
    renderShippingList();
  }
  function deleteShippingFee(id) {
    if(!confirm('删除快递费记录？')) return;
    data.shippingFees = data.shippingFees.filter(f => f.id !== id); saveData();
    renderShippingList();
  }
  function renderShippingList() {
    const container = document.getElementById('shippingList');
    if(data.shippingFees.length === 0) { container.innerHTML = '<p class="empty">暂无快递费记录</p>'; return; }
    data.shippingFees.sort((a,b) => a.date.localeCompare(b.date));
    container.innerHTML = data.shippingFees.map(f => `
      <div class="list-card">
        <div class="line"><span class="label">日期</span><span>${f.date}</span></div>
        <div class="line"><span class="label">金额</span><span>¥${f.amount.toFixed(2)}</span></div>
        <div class="line"><span class="label">备注</span><span>${f.note||''}</span></div>
        <div class="actions"><button class="danger" onclick="deleteShippingFee('${f.id}')">删除</button></div>
      </div>
    `).join('');
  }

  function toggleQuickForm() {
    const form = document.getElementById('quickStockForm');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
  }
  function quickAddStock() {
    const account = document.getElementById('quickAccount').value;
    const product = document.getElementById('quickProduct').value.trim();
    const qty = parseInt(document.getElementById('quickQty').value);
    const price = parseFloat(document.getElementById('quickPrice').value);
    const date = document.getElementById('quickDate').value;
    const remark = document.getElementById('quickRemark').value.trim();
    if(!account || !product || !qty || isNaN(price) || !date) return alert('请完整填写');
    const orderNo = '手动入库-'+Date.now().toString(36);
    const newOrder = { id: genId(), account, orderNo, product, qty, unitPrice: price, date, remark, receivedQty: qty, soldQty: 0, status: 'received', receiveDate: date };
    data.orders.push(newOrder);
    saveData();
    document.getElementById('quickProduct').value = '';
    document.getElementById('quickQty').value = 1;
    document.getElementById('quickPrice').value = '';
    document.getElementById('quickRemark').value = '';
    document.getElementById('quickDate').valueAsDate = new Date();
    updateAllDatalists();
    renderStock();
    alert('入库成功！');
  }

  function renderStock() {
    const search = (document.getElementById('stockSearch')?.value || '').toLowerCase();
    let list = data.orders.filter(o => o.receivedQty > (o.soldQty||0));
    if(search) list = list.filter(o => o.product.toLowerCase().includes(search));
    const container = document.getElementById('stockList');
    let totalCost = 0;
    if(list.length===0) { container.innerHTML = '<p class="empty">暂无库存</p>'; return; }
    container.innerHTML = list.map(o => {
      const remain = o.receivedQty - (o.soldQty||0);
      const remainCost = remain * o.unitPrice;
      totalCost += remainCost;
      return `<div class="list-card">
        <div class="line"><span class="label">商品</span><span>${o.product}</span></div>
        <div class="line"><span class="label">剩余</span><span><strong>${remain}</strong></span></div>
        <div class="line"><span class="label">成本单价</span><span>¥${o.unitPrice.toFixed(2)}</span></div>
        <div class="line"><span class="label">总成本</span><span>¥${remainCost.toFixed(2)}</span></div>
        <div class="actions">
          <button class="warning" onclick="editStockOrder('${o.id}')">编辑</button>
          <button class="danger" onclick="deleteOrder('${o.id}')">删除</button>
        </div>
      </div>`;
    }).join('');
  }

  function editStockOrder(id) { editOrder(id, 'stockEditPanel', true); }
  function editOrder(id, panelId = 'editOrderPanel', renderCallback = null) {
    const order = data.orders.find(o => o.id === id);
    if (!order) return;
    const panel = document.getElementById(panelId);
    panel.style.display = 'block';
    panel.innerHTML = `
      <h4 style="font-size:0.9rem;">✏️ 编辑</h4>
      <div class="row">
        <div class="col"><select id="editAccount">${data.accounts.map(a => `<option value="${a}" ${a===order.account?'selected':''}>${a}</option>`).join('')}</select></div>
        <div class="col"><input type="text" id="editOrderNo" value="${order.orderNo}"></div>
        <div class="col"><input type="text" id="editProduct" value="${order.product}"></div>
      </div>
      <div class="row">
        <div class="col"><input type="number" id="editQty" value="${order.qty}" min="${order.receivedQty||0}"></div>
        <div class="col"><input type="number" id="editPrice" step="0.01" value="${order.unitPrice}"></div>
        <div class="col"><input type="date" id="editDate" value="${order.date}"></div>
      </div>
      <div class="row"><div class="col"><input type="text" id="editRemark" value="${order.remark||''}"></div></div>
      <button onclick="saveEditOrder('${order.id}', '${panelId}', ${renderCallback ? 'true' : 'false'})">💾 保存</button>
      <button class="secondary" onclick="document.getElementById('${panelId}').style.display='none'">取消</button>
    `;
  }
  function saveEditOrder(id, panelId = 'editOrderPanel', hasCallback = false) {
    const order = data.orders.find(o => o.id === id);
    if (!order) return;
    const newQty = parseInt(document.getElementById('editQty').value);
    const newPrice = parseFloat(document.getElementById('editPrice').value);
    if (!newQty || isNaN(newPrice)) return alert('数量和进价必填');
    if (newQty < (order.receivedQty||0)) return alert(`不能小于已签收数量(${order.receivedQty})`);
    order.account = document.getElementById('editAccount').value;
    order.orderNo = document.getElementById('editOrderNo').value.trim();
    order.product = document.getElementById('editProduct').value.trim();
    order.qty = newQty; order.unitPrice = newPrice;
    order.date = document.getElementById('editDate').value;
    order.remark = document.getElementById('editRemark').value.trim();
    saveData();
    document.getElementById(panelId).style.display = 'none';
    updateAllDatalists();
    renderOrderList();
    renderPendingItems();
    if (hasCallback) renderStock();
    alert('修改已保存');
  }

  function toggleStockGroup() {
    const view = document.getElementById('stockGroupView');
    if (view.style.display === 'none') {
      view.style.display = 'block';
      renderStockGroup();
    } else { view.style.display = 'none'; }
  }
  function renderStockGroup() {
    const groupMap = {};
    data.orders.forEach(o => {
      const remain = o.receivedQty - (o.soldQty||0);
      if (remain <= 0) return;
      if (!groupMap[o.product]) groupMap[o.product] = { totalQty: 0, totalCost: 0 };
      groupMap[o.product].totalQty += remain;
      groupMap[o.product].totalCost += remain * o.unitPrice;
    });
    const entries = Object.entries(groupMap);
    if (entries.length === 0) { document.getElementById('stockGroupView').innerHTML = '<p class="empty">暂无库存</p>'; return; }
    let html = '<h4 style="font-size:0.9rem;">📊 按商品汇总</h4>';
    entries.forEach(([product, info]) => {
      const avgPrice = info.totalCost / info.totalQty;
      html += `<div class="list-card">
        <div class="line"><span class="label">商品</span><span>${product}</span></div>
        <div class="line"><span class="label">剩余</span><span>${info.totalQty}</span></div>
        <div class="line"><span class="label">总成本</span><span>¥${info.totalCost.toFixed(2)}</span></div>
        <div class="line"><span class="label">平均进价</span><span>¥${avgPrice.toFixed(2)}</span></div>
      </div>`;
    });
    document.getElementById('stockGroupView').innerHTML = html;
  }

  function renderProfit() {
    const accountFilter = document.getElementById('profitAccount').value;
    const start = document.getElementById('profitStart').value;
    const end = document.getElementById('profitEnd').value;
    let sales = data.sales;
    if(accountFilter !== 'all') {
      sales = sales.filter(s => s.batches?.some(b => {
        const order = data.orders.find(o => o.id === b.orderId);
        return order && order.account === accountFilter;
      }));
    }
    if(start) sales = sales.filter(s => s.saleDate >= start);
    if(end) sales = sales.filter(s => s.saleDate <= end);
    let shippingTotal = 0;
    data.shippingFees.forEach(f => {
      if ((!start || f.date >= start) && (!end || f.date <= end)) shippingTotal += f.amount;
    });
    const totalSales = sales.reduce((s,v) => s + v.salePrice * v.qty, 0);
    const totalCost = sales.reduce((s,v) => s + v.totalCost, 0);
    const profitBeforeShip = sales.reduce((s,v) => s + v.profit, 0);
    const netProfit = profitBeforeShip - shippingTotal;

    document.getElementById('profitSummary').innerHTML = `
      <div class="stat-box"><div>总销售额</div><div class="stat-num">¥${totalSales.toFixed(2)}</div></div>
      <div class="stat-box"><div>商品成本</div><div class="stat-num">¥${totalCost.toFixed(2)}</div></div>
      <div class="stat-box"><div>运费合计</div><div class="stat-num">¥${shippingTotal.toFixed(2)}</div></div>
      <div class="stat-box"><div>净利润</div><div class="stat-num" style="color:${netProfit>=0?'#10b981':'#ef4444'}">¥${netProfit.toFixed(2)}</div></div>
    `;

    const container = document.getElementById('profitList');
    if(sales.length === 0) { container.innerHTML = '<p class="empty">无数据</p>'; document.getElementById('profitGroupSummary').innerHTML = ''; return; }
    container.innerHTML = sales.map(s => `
      <div class="list-card">
        <div class="line"><span class="label">商品</span><span>${s.product}</span></div>
        <div class="line"><span class="label">数量</span><span>${s.qty}</span></div>
        <div class="line"><span class="label">销售额</span><span>¥${(s.salePrice*s.qty).toFixed(2)}</span></div>
        <div class="line"><span class="label">利润</span><span style="color:${s.profit>=0?'#10b981':'#ef4444'}">¥${s.profit.toFixed(2)}</span></div>
        <div class="line"><span class="label">日期</span><span>${s.saleDate}</span></div>
      </div>
    `).join('');

    const groupMap = {};
    sales.forEach(s => {
      if (!groupMap[s.product]) groupMap[s.product] = { qty: 0, sales: 0, profit: 0 };
      groupMap[s.product].qty += s.qty;
      groupMap[s.product].sales += s.salePrice * s.qty;
      groupMap[s.product].profit += s.profit;
    });
    const groupArray = Object.entries(groupMap).map(([k,v]) => ({ product: k, ...v }));
    let html = '<h4 style="font-size:0.9rem;margin-top:14px;">📊 按商品汇总</h4>';
    groupArray.forEach(g => {
      html += `<div class="list-card">
        <div class="line"><span class="label">商品</span><span>${g.product}</span></div>
        <div class="line"><span class="label">销量</span><span>${g.qty}</span></div>
        <div class="line"><span class="label">销售额</span><span>¥${g.sales.toFixed(2)}</span></div>
        <div class="line"><span class="label">利润</span><span style="color:${g.profit>=0?'#10b981':'#ef4444'}">¥${g.profit.toFixed(2)}</span></div>
      </div>`;
    });
    document.getElementById('profitGroupSummary').innerHTML = html;
  }

  const ocrImageInput = document.getElementById('ocrImageInput');
  ocrImageInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (loadEvent) => {
      document.getElementById('ocrPreview').src = loadEvent.target.result;
      document.getElementById('ocrPreview').style.display = 'block';
    };
    reader.readAsDataURL(file);
    document.getElementById('ocrStatus').innerHTML = '⏳ 识别中...';
    Tesseract.recognize(file, 'chi_sim', {
      logger: (m) => { if (m.status === 'recognizing text') document.getElementById('ocrStatus').innerHTML = `⏳ ${Math.round(m.progress*100)}%`; }
    }).then(({ data: { text } }) => {
      document.getElementById('ocrStatus').innerHTML = '✅ 识别完成';
      let filled = false;
      const orderNoMatch = text.match(/订单编号[:\s]*(\d{12,16})/);
      if (orderNoMatch && orderNoMatch[1]) { document.getElementById('orderNo').value = orderNoMatch[1]; filled = true; }
      const qtyMatch = text.match(/数量\s*[×xX]\s*(\d+)/);
      if (qtyMatch && qtyMatch[1]) { document.getElementById('itemQty').value = qtyMatch[1]; filled = true; }
      let priceMatch = text.match(/到手[¥￥]\s*(\d+\.?\d*)/);
      if (!priceMatch) priceMatch = text.match(/合计[¥￥]\s*(\d+\.?\d*)/);
      if (!priceMatch) priceMatch = text.match(/实付款[:\s]*.*?[¥￥]\s*(\d+\.?\d*)/);
      if (priceMatch && priceMatch[1]) { document.getElementById('itemPrice').value = priceMatch[1]; filled = true; }
      if (!filled) alert('未识别到订单信息，请手动输入');
    }).catch(() => { document.getElementById('ocrStatus').innerHTML = '❌ 失败'; });
  });

  function switchTab(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
    if(name==='tab-stock') renderStock();
    if(name==='tab-profit') renderProfit();
    if(name==='tab-receive') renderPendingItems();
    if(name==='tab-purchase') { renderOrderList(); updateAllDatalists(); }
    if(name==='tab-sale') { updateSalePreview(); updateAllDatalists(); }
    if(name==='tab-shipping') renderShippingList();
  }

  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
  document.getElementById('saleProduct').addEventListener('input', updateSalePreview);
  document.getElementById('saleQty').addEventListener('input', updateSalePreview);
  document.getElementById('salePrice').addEventListener('input', updateSalePreview);
  document.getElementById('orderSearch')?.addEventListener('input', renderOrderList);
  document.getElementById('receiveSearch')?.addEventListener('input', renderPendingItems);
  document.getElementById('stockSearch')?.addEventListener('input', renderStock);
  document.getElementById('quickProduct').addEventListener('focus', updateAllDatalists);

  loadData();
  refreshAllUI();
  document.getElementById('orderDate').valueAsDate = new Date();
  document.getElementById('saleDate').valueAsDate = new Date();
  document.getElementById('shippingDate').valueAsDate = new Date();
  document.getElementById('quickDate').valueAsDate = new Date();
  if(document.getElementById('profitEnd')) document.getElementById('profitEnd').valueAsDate = new Date();
</script>
</body>
</html>
