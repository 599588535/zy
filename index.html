<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>进销存 · 个人版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #222; padding: 16px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    h1 { font-size: 1.8rem; }
    .sync-btns { display: flex; gap: 8px; }
    .sync-btns button { background: white; border: 1px solid #ccc; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
    .tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid #ddd; }
    .tab { padding: 10px 18px; background: #f0f0f0; border: 1px solid #ddd; border-bottom: none; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
    .tab.active { background: white; color: #2563eb; border-color: #2563eb; font-weight: 600; }
    .panel { background: white; border: 1px solid #e5e7eb; border-radius: 0 12px 12px 12px; padding: 20px; display: none; }
    .panel.active { display: block; }
    .row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; align-items: center; }
    .col { flex: 1 1 180px; }
    label { display: block; font-weight: 500; margin-bottom: 4px; font-size: 0.85rem; color: #444; }
    input, select, button { padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.9rem; width: 100%; background: white; }
    button { background: #2563eb; color: white; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; width: auto; padding: 10px 20px; }
    button:hover { opacity: 0.9; }
    button.danger { background: #b91c1c; }
    button.secondary { background: #e5e7eb; color: #333; }
    button.success { background: #16a34a; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.85rem; }
    th { background: #f3f4f6; padding: 10px 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #e5e7eb; }
    td { padding: 8px 12px; border-bottom: 1px solid #eee; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 500; }
    .badge-warning { background: #fef3c7; color: #92400e; }
    .badge-success { background: #dcfce7; color: #166534; }
    hr { margin: 16px 0; border: 0.5px solid #e5e7eb; }
    .empty { color: #888; text-align: center; padding: 30px; }
    .stat-box { background: #f9fafb; border: 1px solid #eee; border-radius: 8px; padding: 14px 18px; display: inline-block; margin-right: 12px; margin-bottom: 12px; min-width: 130px; }
    .stat-num { font-size: 1.8rem; font-weight: 700; color: #111827; }
    .item-list { background: #f8fafc; padding: 12px; border-radius: 8px; margin-bottom: 12px; }
    .item-row { display: flex; gap: 12px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
    .item-row input { width: auto; flex: 1; }
    .total-cost-row { background: #f0f4ff; font-weight: 700; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📦 京东多账号进销存</h1>
    <div class="sync-btns">
      <button onclick="exportData()">📤 导出数据</button>
      <button onclick="document.getElementById('importFile').click()">📥 导入数据</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
    </div>
  </div>
  <p style="color:#666; margin-bottom: 8px;">个人版 · 混合采购 + 一键签收 | 快递费按日期</p>

  <div class="tabs">
    <div class="tab active" data-tab="tab-accounts">👤 账号</div>
    <div class="tab" data-tab="tab-purchase-order">📋 采购录入</div>
    <div class="tab" data-tab="tab-receive">✅ 签收登记</div>
    <div class="tab" data-tab="tab-sale">📤 销售出库</div>
    <div class="tab" data-tab="tab-shipping">🚚 快递费</div>
    <div class="tab" data-tab="tab-stock">📊 库存</div>
    <div class="tab" data-tab="tab-profit">💰 利润</div>
  </div>

  <!-- 账号管理 -->
  <div id="tab-accounts" class="panel active">
    <div class="row">
      <div class="col"><input type="text" id="newAccountName" placeholder="账号名称，例如：京东号A"></div>
      <div><button onclick="addAccount()">➕ 添加</button></div>
    </div>
    <table id="accountTable">
      <thead><tr><th>账号名称</th><th style="width:80px;"></th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- 采购录入 -->
  <div id="tab-purchase-order" class="panel">
    <div class="row">
      <div class="col"><label>账号</label><select id="orderAccount"></select></div>
      <div class="col"><label>京东订单号</label><input type="text" id="orderNo" placeholder="必填"></div>
      <div class="col"><label>下单日期</label><input type="date" id="orderDate"></div>
    </div>
    <div class="row">
      <div class="col"><label>备注</label><input type="text" id="orderRemark" placeholder="选填"></div>
    </div>
    <hr>
    <h4>添加商品到当前订单</h4>
    <div class="row">
      <div class="col"><label>商品名称</label><input type="text" id="itemProduct" list="productList" autocomplete="off" placeholder="输入或选择历史商品"></div>
      <datalist id="productList"></datalist>
      <div class="col"><label>数量</label><input type="number" id="itemQty" value="1" min="1"></div>
      <div class="col"><label>进价 (元/件)</label><input type="number" id="itemPrice" step="0.01" placeholder="单价"></div>
      <div><button class="secondary" onclick="addItemToCart()">➕ 添加商品</button></div>
    </div>
    <div class="item-list" id="cartItems">
      <p style="color:#888;">暂无商品，请添加</p>
    </div>
    <div class="row" style="justify-content: flex-end;">
      <button onclick="saveOrderItems()">📝 保存采购单</button>
    </div>
    <hr>
    <div class="row">
      <div class="col"><input type="text" id="orderSearch" placeholder="🔍 搜索订单号或商品"></div>
      <div><button class="secondary" onclick="renderOrderList()">刷新</button></div>
    </div>
    <table id="orderTable">
      <thead><tr><th>账号</th><th>订单号</th><th>商品</th><th>订购</th><th>已签收</th><th>状态</th><th>日期</th><th></th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- 签收登记（无筛选，直接全部） -->
  <div id="tab-receive" class="panel">
    <div class="row" style="justify-content: flex-end;">
      <button class="secondary" onclick="renderPendingOrders()">刷新</button>
    </div>
    <table id="pendingTable">
      <thead><tr><th>账号</th><th>订单号</th><th>商品数</th><th>订购总数</th><th>已签收数</th><th>未签收数</th><th>下单日期</th><th>操作</th></tr></thead>
      <tbody></tbody>
    </table>
    <p style="color:#666; margin-top:12px;">💡 一键签收该订单下的所有商品，进价沿用采购时价格，日期为今天。</p>
  </div>

  <!-- 销售出库 -->
  <div id="tab-sale" class="panel">
    <div class="row">
      <div class="col"><label>商品名称</label><input type="text" id="saleProduct" list="saleProductList" autocomplete="off" placeholder="选择或输入商品"></div>
      <datalist id="saleProductList"></datalist>
      <div class="col"><label>数量</label><input type="number" id="saleQty" value="1" min="1"></div>
      <div class="col"><label>售价 (元/件)</label><input type="number" id="salePrice" step="0.01" placeholder="拼多多卖价"></div>
    </div>
    <div class="row">
      <div class="col"><label>销售日期</label><input type="date" id="saleDate"></div>
    </div>
    <div class="row">
      <div class="col"><strong>预估商品成本：</strong><span id="costPreview">--</span> 元/件</div>
      <div class="col"><strong>预估总成本：</strong><span id="totalCostPreview">--</span> 元</div>
      <div class="col"><strong>预估利润：</strong><span id="estProfit">--</span> 元（未含快递费）</div>
      <div><button onclick="addSale()">📌 记录销售</button></div>
    </div>
    <hr>
    <table id="saleTable">
      <thead><tr><th>商品</th><th>数量</th><th>售价</th><th>商品成本</th><th>利润(未扣运费)</th><th>日期</th><th></th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- 快递费 -->
  <div id="tab-shipping" class="panel">
    <div class="row">
      <div class="col"><label>日期</label><input type="date" id="shippingDate"></div>
      <div class="col"><label>总快递费 (元)</label><input type="number" id="shippingAmount" step="0.01" placeholder="例如当天或两天合计"></div>
      <div class="col"><label>备注 (选填)</label><input type="text" id="shippingNote" placeholder="例如：圆通/顺丰"></div>
      <div><button onclick="addShippingFee()">🚚 记录快递费</button></div>
    </div>
    <hr>
    <table id="shippingTable">
      <thead><tr><th>日期</th><th>金额</th><th>备注</th><th></th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- 库存总览（默认全部） -->
  <div id="tab-stock" class="panel">
    <div class="row" style="justify-content: flex-end;">
      <button class="secondary" onclick="renderStock()">刷新</button>
    </div>
    <table id="stockTable">
      <thead><tr><th>账号</th><th>订单号</th><th>商品</th><th>签收数</th><th>已售</th><th>剩余</th><th>成本</th><th>签收日</th></tr></thead>
      <tbody></tbody>
    </table>
    <div id="stockTotalCost" style="margin-top: 12px; font-weight: 600;"></div>
  </div>

  <!-- 利润报表 -->
  <div id="tab-profit" class="panel">
    <div class="row">
      <div class="col"><label>账号</label><select id="profitAccount"><option value="all">全部</option></select></div>
      <div class="col"><label>从</label><input type="date" id="profitStart"></div>
      <div class="col"><label>到</label><input type="date" id="profitEnd"></div>
      <div><button onclick="renderProfit()">查询</button></div>
    </div>
    <div id="profitSummary" style="margin-bottom:12px;"></div>
    <table id="profitDetailTable">
      <thead><tr><th>商品</th><th>数量</th><th>销售额</th><th>商品成本</th><th>利润(未扣运费)</th><th>日期</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
  // ⚠️ 数据存储键名固定，永远不改，保你数据安全
  const STORAGE_KEY = 'JD_INVENTORY_V6';

  let data = {
    accounts: ['京东账号A', '京东账号B', '京东账号C', '京东账号D', '京东账号E', '京东账号F', '京东账号G'],
    orders: [],
    sales: [],
    shippingFees: []
  };

  let currentCart = [];

  function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  function loadData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        const p = JSON.parse(stored);
        data.accounts = p.accounts || data.accounts;
        data.orders = p.orders || [];
        data.sales = p.sales || [];
        data.shippingFees = p.shippingFees || [];
      } catch(e) {}
    }
    document.getElementById('orderDate').valueAsDate = new Date();
    document.getElementById('saleDate').valueAsDate = new Date();
    document.getElementById('shippingDate').valueAsDate = new Date();
    updateAllDatalists();
    clearCart();
  }

  // 导出导入
  function exportData() {
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `进销存_备份_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }
  function importData(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const imported = JSON.parse(e.target.result);
        if (imported.accounts && imported.orders && imported.sales && imported.shippingFees) {
          if (confirm('即将覆盖当前所有数据，确定导入吗？')) {
            data = imported;
            saveData();
            refreshAllUI();
            alert('导入成功！');
          }
        } else {
          alert('文件格式不正确');
        }
      } catch(err) {
        alert('解析失败，请检查文件');
      }
    };
    reader.readAsText(file);
    input.value = '';
  }

  function refreshAllUI() {
    refreshSelects();
    renderAccounts();
    renderOrderList();
    renderPendingOrders();
    renderSaleList();
    renderShippingFees();
    renderStock();
    updateAllDatalists();
    updateSalePreview();
  }

  function refreshSelects() {
    const orderAccount = document.getElementById('orderAccount');
    if(orderAccount) {
      orderAccount.innerHTML = '';
      data.accounts.forEach(a => orderAccount.innerHTML += `<option value="${a}">${a}</option>`);
    }
    // 利润报表的账号下拉还在，需要保留
    const profitAccount = document.getElementById('profitAccount');
    if(profitAccount) {
      profitAccount.innerHTML = '<option value="all">全部</option>';
      data.accounts.forEach(a => profitAccount.innerHTML += `<option value="${a}">${a}</option>`);
    }
  }

  function genId() { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); }

  function updateAllDatalists() {
    const products = [...new Set(data.orders.map(o => o.product))];
    const html = products.map(p => `<option value="${p}">`).join('');
    document.getElementById('productList').innerHTML = html;
    document.getElementById('saleProductList').innerHTML = html;
  }

  // ---- 账号 ----
  function addAccount() {
    const name = document.getElementById('newAccountName').value.trim();
    if(!name) return alert('请输入名称');
    if(data.accounts.includes(name)) return alert('已存在');
    data.accounts.push(name);
    saveData();
    document.getElementById('newAccountName').value = '';
    refreshSelects();
    renderAccounts();
  }
  function deleteAccount(name) {
    if(!confirm(`确定删除“${name}”吗？`)) return;
    data.accounts = data.accounts.filter(a => a !== name);
    saveData();
    refreshSelects();
    renderAccounts();
  }
  function renderAccounts() {
    document.querySelector('#accountTable tbody').innerHTML = data.accounts.map(a => `<tr><td>${a}</td><td><button class="danger" onclick="deleteAccount('${a}')">删除</button></td></tr>`).join('');
  }

  // ---- 采购录入 ----
  function clearCart() { currentCart = []; renderCart(); }
  function addItemToCart() {
    const product = document.getElementById('itemProduct').value.trim();
    const qty = parseInt(document.getElementById('itemQty').value);
    const price = parseFloat(document.getElementById('itemPrice').value);
    if(!product || !qty || isNaN(price)) return alert('请完整填写商品、数量和进价');
    currentCart.push({ product, qty, unitPrice: price });
    document.getElementById('itemProduct').value = '';
    document.getElementById('itemQty').value = 1;
    document.getElementById('itemPrice').value = '';
    renderCart();
  }
  function removeFromCart(index) { currentCart.splice(index, 1); renderCart(); }
  function renderCart() {
    const container = document.getElementById('cartItems');
    if (currentCart.length === 0) {
      container.innerHTML = '<p style="color:#888;">暂无商品，请添加</p>';
      return;
    }
    container.innerHTML = currentCart.map((item, idx) => `
      <div class="item-row">
        <span>${item.product}</span>
        <span>数量: ${item.qty}</span>
        <span>单价: ¥${item.unitPrice.toFixed(2)}</span>
        <button class="danger" style="padding:4px 12px;" onclick="removeFromCart(${idx})">删除</button>
      </div>
    `).join('');
  }
  function saveOrderItems() {
    const account = document.getElementById('orderAccount').value;
    const orderNo = document.getElementById('orderNo').value.trim();
    const date = document.getElementById('orderDate').value;
    const remark = document.getElementById('orderRemark').value.trim();
    if(!account || !orderNo || !date) return alert('请填写账号、订单号和日期');
    if(currentCart.length === 0) return alert('请至少添加一个商品');
    const newOrders = currentCart.map(item => ({
      id: genId(),
      account,
      orderNo,
      product: item.product,
      qty: item.qty,
      unitPrice: item.unitPrice,
      date,
      remark,
      receivedQty: 0,
      soldQty: 0,
      status: 'pending'
    }));
    data.orders.push(...newOrders);
    saveData();
    clearCart();
    document.getElementById('orderNo').value = '';
    document.getElementById('orderRemark').value = '';
    updateAllDatalists();   // 更新记忆列表，让你下次能选
    renderOrderList();
    alert('采购单已保存！');
  }
  function deleteOrder(id) {
    if(!confirm('删除此采购记录？')) return;
    data.orders = data.orders.filter(o => o.id !== id);
    saveData();
    updateAllDatalists();
    renderOrderList();
    renderPendingOrders();
  }
  function renderOrderList() {
    const search = (document.getElementById('orderSearch')?.value || '').toLowerCase();
    let list = data.orders;
    if(search) list = list.filter(o => o.orderNo.toLowerCase().includes(search) || o.product.toLowerCase().includes(search));
    const tbody = document.querySelector('#orderTable tbody');
    if(list.length===0) { tbody.innerHTML = '<tr><td colspan="8" class="empty">暂无采购单</td></tr>'; return; }
    tbody.innerHTML = list.map(o => {
      const badge = o.status==='received' ? '<span class="badge badge-success">已签收</span>' : '<span class="badge badge-warning">待签收</span>';
      return `<tr>
        <td>${o.account}</td><td>${o.orderNo}</td><td>${o.product}</td><td>${o.qty}</td><td>${o.receivedQty}</td>
        <td>${badge}</td><td>${o.date}</td>
        <td><button class="danger" onclick="deleteOrder('${o.id}')">删除</button></td>
      </tr>`;
    }).join('');
  }

  // ---- 签收登记（不再选账号，直接显示全部） ----
  function getPendingGroups() {
    const groups = {};
    data.orders.forEach(o => {
      if (o.receivedQty < o.qty) {
        if (!groups[o.orderNo]) {
          groups[o.orderNo] = {
            orderNo: o.orderNo,
            account: o.account,
            date: o.date,
            items: [],
            totalOrdered: 0,
            totalReceived: 0
          };
        }
        groups[o.orderNo].items.push(o);
        groups[o.orderNo].totalOrdered += o.qty;
        groups[o.orderNo].totalReceived += o.receivedQty;
      }
    });
    return Object.values(groups);
  }
  function quickReceiveByOrderNo(orderNo) {
    const ordersToUpdate = data.orders.filter(o => o.orderNo === orderNo && o.receivedQty < o.qty);
    if(ordersToUpdate.length === 0) return;
    ordersToUpdate.forEach(o => {
      o.receivedQty = o.qty;
      o.status = 'received';
      o.receiveDate = new Date().toISOString().split('T')[0];
    });
    saveData();
    renderPendingOrders();
    renderOrderList();
    alert('该订单下所有商品已签收！');
  }
  function renderPendingOrders() {
    const groups = getPendingGroups();
    const tbody = document.querySelector('#pendingTable tbody');
    if(groups.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty">🎉 所有商品均已签收</td></tr>';
      return;
    }
    tbody.innerHTML = groups.map(g => {
      const left = g.totalOrdered - g.totalReceived;
      return `<tr>
        <td>${g.account}</td><td>${g.orderNo}</td><td>${g.items.length} 种</td><td>${g.totalOrdered}</td><td>${g.totalReceived}</td>
        <td><strong>${left}</strong></td><td>${g.date}</td>
        <td><button class="success" onclick="quickReceiveByOrderNo('${g.orderNo}')">📦 签收</button></td>
      </tr>`;
    }).join('');
  }

  // ---- 销售 ----
  function getAvailableStock(productName) {
    return data.orders
      .filter(o => o.product === productName && o.receivedQty > (o.soldQty||0))
      .sort((a,b) => (a.receiveDate||a.date).localeCompare(b.receiveDate||b.date));
  }
  function updateSalePreview() {
    const product = document.getElementById('saleProduct').value.trim();
    const qty = parseInt(document.getElementById('saleQty').value) || 0;
    const price = parseFloat(document.getElementById('salePrice').value) || 0;
    if (!product || qty <= 0) {
      document.getElementById('costPreview').innerText = '--';
      document.getElementById('totalCostPreview').innerText = '--';
      document.getElementById('estProfit').innerText = '--';
      return;
    }
    const stock = getAvailableStock(product);
    let remaining = qty, totalCost = 0;
    for (let order of stock) {
      const avail = order.receivedQty - (order.soldQty||0);
      const take = Math.min(remaining, avail);
      totalCost += take * order.unitPrice;
      remaining -= take;
      if (remaining === 0) break;
    }
    if (remaining > 0) {
      document.getElementById('costPreview').innerText = '库存不足';
      document.getElementById('totalCostPreview').innerText = '--';
      document.getElementById('estProfit').innerText = '--';
      return;
    }
    const unitAvg = totalCost / qty;
    const profit = price * qty - totalCost;
    document.getElementById('costPreview').innerText = unitAvg.toFixed(2);
    document.getElementById('totalCostPreview').innerText = totalCost.toFixed(2);
    document.getElementById('estProfit').innerText = profit.toFixed(2);
  }
  function addSale() {
    const product = document.getElementById('saleProduct').value.trim();
    const qty = parseInt(document.getElementById('saleQty').value);
    const price = parseFloat(document.getElementById('salePrice').value);
    const saleDate = document.getElementById('saleDate').value;
    if(!product || !qty || isNaN(price) || !saleDate) return alert('请完整填写');
    const stock = getAvailableStock(product);
    let remaining = qty, totalCost = 0;
    const batches = [];
    for (let order of stock) {
      const avail = order.receivedQty - (order.soldQty||0);
      const take = Math.min(remaining, avail);
      totalCost += take * order.unitPrice;
      batches.push({ orderId: order.id, qty: take, unitCost: order.unitPrice });
      remaining -= take;
      if (remaining === 0) break;
    }
    if (remaining > 0) {
      const totalAvail = stock.reduce((s,o) => s + (o.receivedQty - (o.soldQty||0)), 0);
      return alert(`库存不足，剩余 ${totalAvail} 件`);
    }
    const profit = price * qty - totalCost;
    const sale = { id: genId(), product, qty, salePrice: price, totalCost, profit, saleDate, batches };
    for (let b of batches) {
      const order = data.orders.find(o => o.id === b.orderId);
      if (order) order.soldQty = (order.soldQty||0) + b.qty;
    }
    data.sales.push(sale);
    saveData();
    document.getElementById('saleQty').value = 1;
    document.getElementById('salePrice').value = '';
    renderSaleList();
    updateAllDatalists();
    updateSalePreview();
  }
  function deleteSale(id) {
    if(!confirm('删除此销售记录将恢复库存，确定吗？')) return;
    const sale = data.sales.find(s => s.id === id);
    if(sale && sale.batches) {
      for (let b of sale.batches) {
        const order = data.orders.find(o => o.id === b.orderId);
        if(order) order.soldQty = Math.max(0, (order.soldQty||0) - b.qty);
      }
    }
    data.sales = data.sales.filter(s => s.id !== id);
    saveData();
    renderSaleList();
  }
  function renderSaleList() {
    const tbody = document.querySelector('#saleTable tbody');
    if(data.sales.length === 0) { tbody.innerHTML = '<tr><td colspan="7" class="empty">暂无销售记录</td></tr>'; return; }
    tbody.innerHTML = data.sales.map(s => `
      <tr>
        <td>${s.product}</td><td>${s.qty}</td><td>¥${s.salePrice.toFixed(2)}</td><td>¥${s.totalCost.toFixed(2)}</td>
        <td style="color:${s.profit>=0?'#16a34a':'#b91c1c'}">¥${s.profit.toFixed(2)}</td><td>${s.saleDate}</td>
        <td><button class="danger" onclick="deleteSale('${s.id}')">删除</button></td>
      </tr>`).join('');
  }

  // ---- 快递费 ----
  function addShippingFee() {
    const date = document.getElementById('shippingDate').value;
    const amount = parseFloat(document.getElementById('shippingAmount').value);
    const note = document.getElementById('shippingNote').value.trim();
    if(!date || isNaN(amount) || amount <= 0) return alert('请填写日期和有效金额');
    data.shippingFees.push({ id: genId(), date, amount, note });
    saveData();
    document.getElementById('shippingAmount').value = '';
    document.getElementById('shippingNote').value = '';
    renderShippingFees();
  }
  function deleteShippingFee(id) {
    if(!confirm('删除快递费记录？')) return;
    data.shippingFees = data.shippingFees.filter(f => f.id !== id);
    saveData();
    renderShippingFees();
  }
  function renderShippingFees() {
    const tbody = document.querySelector('#shippingTable tbody');
    if(data.shippingFees.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="empty">暂无快递费记录</td></tr>'; return; }
    data.shippingFees.sort((a,b) => a.date.localeCompare(b.date));
    tbody.innerHTML = data.shippingFees.map(f => `
      <tr><td>${f.date}</td><td>¥${f.amount.toFixed(2)}</td><td>${f.note || ''}</td><td><button class="danger" onclick="deleteShippingFee('${f.id}')">删除</button></td></tr>`).join('');
  }

  // ---- 库存（默认全部，无筛选） ----
  function renderStock() {
    const list = data.orders.filter(o => o.receivedQty > (o.soldQty||0));
    const tbody = document.querySelector('#stockTable tbody');
    let totalCost = 0;
    if(list.length===0) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty">暂无库存</td></tr>';
      document.getElementById('stockTotalCost').innerText = '';
      return;
    }
    tbody.innerHTML = list.map(o => {
      const remain = o.receivedQty - (o.soldQty||0);
      totalCost += remain * o.unitPrice;
      return `<tr>
        <td>${o.account}</td><td>${o.orderNo}</td><td>${o.product}</td><td>${o.receivedQty}</td><td>${o.soldQty||0}</td><td><strong>${remain}</strong></td><td>¥${o.unitPrice.toFixed(2)}</td><td>${o.receiveDate||''}</td>
      </tr>`;
    }).join('');
    document.getElementById('stockTotalCost').innerHTML = `<div style="text-align:right; margin-top:8px;">📊 库存总成本：<strong style="font-size:1.2rem;">¥${totalCost.toFixed(2)}</strong></div>`;
  }

  // ---- 利润 ----
  function renderProfit() {
    const accountFilter = document.getElementById('profitAccount').value;
    const start = document.getElementById('profitStart').value;
    const end = document.getElementById('profitEnd').value;
    let sales = data.sales;
    if(accountFilter !== 'all') {
      sales = sales.filter(s => s.batches?.some(b => {
        const order = data.orders.find(o => o.id === b.orderId);
        return order && order.account === accountFilter;
      }));
    }
    if(start) sales = sales.filter(s => s.saleDate >= start);
    if(end) sales = sales.filter(s => s.saleDate <= end);
    let shippingTotal = 0;
    data.shippingFees.forEach(f => {
      if ((!start || f.date >= start) && (!end || f.date <= end)) shippingTotal += f.amount;
    });
    const totalSalesAmount = sales.reduce((s,v) => s + v.salePrice * v.qty, 0);
    const totalCost = sales.reduce((s,v) => s + v.totalCost, 0);
    const totalProfitBeforeShip = sales.reduce((s,v) => s + v.profit, 0);
    const netProfit = totalProfitBeforeShip - shippingTotal;
    document.getElementById('profitSummary').innerHTML = `
      <div class="stat-box"><div>总销售额</div><div class="stat-num">¥${totalSalesAmount.toFixed(2)}</div></div>
      <div class="stat-box"><div>商品成本</div><div class="stat-num">¥${totalCost.toFixed(2)}</div></div>
      <div class="stat-box"><div>快递费合计</div><div class="stat-num">¥${shippingTotal.toFixed(2)}</div></div>
      <div class="stat-box"><div>净利润</div><div class="stat-num" style="color:${netProfit>=0?'#16a34a':'#b91c1c'}">¥${netProfit.toFixed(2)}</div></div>
    `;
    const tbody = document.querySelector('#profitDetailTable tbody');
    if(sales.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="empty">无数据</td></tr>'; return; }
    tbody.innerHTML = sales.map(s => `
      <tr><td>${s.product}</td><td>${s.qty}</td><td>¥${(s.salePrice*s.qty).toFixed(2)}</td><td>¥${s.totalCost.toFixed(2)}</td><td style="color:${s.profit>=0?'#16a34a':'#b91c1c'}">¥${s.profit.toFixed(2)}</td><td>${s.saleDate}</td></tr>`).join('');
  }

  // 标签页切换
  function switchTab(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
    if(name==='tab-stock') renderStock();
    if(name==='tab-profit') renderProfit();
    if(name==='tab-receive') renderPendingOrders();
    if(name==='tab-purchase-order') { renderOrderList(); updateAllDatalists(); }
    if(name==='tab-sale') { updateSalePreview(); updateAllDatalists(); }
    if(name==='tab-shipping') renderShippingFees();
  }

  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
  document.getElementById('saleProduct').addEventListener('input', updateSalePreview);
  document.getElementById('saleQty').addEventListener('input', updateSalePreview);
  document.getElementById('salePrice').addEventListener('input', updateSalePreview);
  document.getElementById('orderSearch')?.addEventListener('input', renderOrderList);

  // 初始化
  loadData();
  refreshAllUI();
  document.getElementById('orderDate').valueAsDate = new Date();
  document.getElementById('saleDate').valueAsDate = new Date();
  document.getElementById('shippingDate').valueAsDate = new Date();
  if(document.getElementById('profitEnd')) document.getElementById('profitEnd').valueAsDate = new Date();
</script>
</body>
</html>
